<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – Neo Brutal Chat</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">
    <h1>NEO BRUTAL CHAT</h1>

    <div class="form-block">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="username" placeholder="Username (only for register)">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">LOGIN</button>
        <button class="yellow" onclick="registerUser()">REGISTER</button>
    </div>

    <p id="msg"></p>
</div>

<script src="login.js"></script>
</body>
</html>
